<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DuRide — Under Construction</title>
  <meta name="description" content="DuRide is under construction. We'll be live soon." />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🚧</text></svg>" />
  <style>
    :root {
      --bg: #0f172a;
      --bg-accent: #1e293b;
      --fg: #f8fafc;
      --muted: #94a3b8;
      --brand: #38bdf8;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      color: var(--fg);
      background: radial-gradient(1200px 600px at 50% -10%, var(--bg-accent), var(--bg));
      text-align: center;
    }

    .card {
      max-width: 560px;
    }

    .icon {
      font-size: 4rem;
      line-height: 1;
      margin-bottom: 1.5rem;
    }

    h1 {
      font-size: clamp(1.8rem, 5vw, 2.75rem);
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 1rem;
    }

    h1 .brand { color: var(--brand); }

    p {
      font-size: 1.05rem;
      line-height: 1.6;
      color: var(--muted);
      margin-bottom: 2rem;
    }

    .bar {
      width: 100%;
      max-width: 320px;
      height: 8px;
      margin: 0 auto 2rem;
      border-radius: 999px;
      background: var(--bg-accent);
      overflow: hidden;
    }

    .bar span {
      display: block;
      height: 100%;
      width: 40%;
      border-radius: 999px;
      background: linear-gradient(90deg, transparent, var(--brand), transparent);
      animation: slide 1.8s ease-in-out infinite;
    }

    @keyframes slide {
      0%   { transform: translateX(-120%); }
      100% { transform: translateX(320%); }
    }

    a.contact {
      color: var(--brand);
      text-decoration: none;
      font-weight: 600;
    }

    a.contact:hover { text-decoration: underline; }

    footer {
      margin-top: 2.5rem;
      font-size: 0.85rem;
      color: var(--muted);
    }

    @media (prefers-reduced-motion: reduce) {
      .bar span { animation: none; width: 100%; }
    }
  </style>
</head>
<body>
  <main class="card">
    <div class="icon" aria-hidden="true">🚧</div>
    <h1>We're building something great at <span class="brand">DuRide</span></h1>
    <p>Our site is currently under construction. Check back soon.</p>
    <div class="bar" role="progressbar" aria-label="Site under construction"><span></span></div>
    <footer>© <span id="year"></span> DuRide. All rights reserved.</footer>
  </main>
  <script>
    document.getElementById("year").textContent = new Date().getFullYear();
  </script>
</body>
</html>
